<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start</title>
    <link rel="stylesheet" href="./css/indexStyle.css">
    <script src="./js/indexScript.js" defer></script>
    <link rel="icon" href="./img/LogoImg.png" type="image/png">
    <link rel="stylesheet" href="./css/tutorialStyle.css">
    <link rel="stylesheet" href="./css/achievmentsStyle.css">
    <link rel="stylesheet" href="./css/LevelPickStyle.css">
    

</head>

<body>

    <div id="audioBox">
        <h1>Audio Erlebnis einschalten?</h1>
        <div id="btnDiv">
            <div onclick="startAudio()" class="audioBtn">Sicher</div>
            <div onclick="declineAudio()" class="audioBtn">Lieber nicht</div>
        </div>
    </div>

    <div id="headlineLogo">
        <img src="./img/LogoImg.png" alt="LOGO">
    </div>
    <nav class="nav-grid">


        <a href="#" onclick="openLevelPick(); return false;">
            <img src="./img/Buttons/startGameBtn.png" alt="STARTGAME">
        </a>

        <a href="#" onclick="openTutorial(); return false;">
            <img src="./img/Buttons/questionMarkBtn.png" alt="TUTORIAL">
        </a>

        <a href="#" onclick="openAchievments(); return false;">
            <img src="./img/Buttons/achievmentBtnAndTrophie.png" alt="ACHIEVMENTS">
        </a>
    </nav>



    <div id="tutorialContainer">

        <div onclick="closeTutorial()" id="backBtn" class="backBtn">
            <img src="./img/Buttons/closeWoodBtn-removebg-preview.png" alt="GO BACK">
        </div>

        <div class="boardSection">
            <div id="bigImg">
                <img src="./img/Buttons/woodboard.png" alt="WOODBOARD">
                <p>Hier wird dir die Geschichte erklärt und auf den Btns unten kannst du dann eine Entscheidung treffen
                </p>
            </div>

            <div class="smallRow">
                <div class="smallImg">
                    <img src="./img/Buttons/woodboard.png" alt="WOODBOARD">
                    <p>Entscheidung 1:</p>
                </div>
                <div class="smallImg">
                    <img src="./img/Buttons/woodboard.png" alt="WOODBOARD">
                    <p>Entscheidung 2:</p>
                </div>
            </div>
        </div>
    </div>

    <div id="achievementsContainer">
        <div onclick="closeAchievments()" class="backBtn">
            <img src="./img/Buttons/closeWoodBtn-removebg-preview.png" alt="GO BACK">
        </div>

        <main class="achievements-grid">
            <figure class="achievment">
                <img src="./img/Buttons/achievmentBtnAndTrophie.png" alt="TROPHIE">
                <figcaption>Achievement 1</figcaption>
            </figure>
            <figure class="achievment">
                <img src="./img/Buttons/achievmentBtnAndTrophie.png" alt="TROPHIE">
                <figcaption>Achievement 2</figcaption>
            </figure>
            <figure class="achievment">
                <img src="./img/Buttons/achievmentBtnAndTrophie.png" alt="TROPHIE">
                <figcaption>Achievement 3</figcaption>
            </figure>
            <figure class="achievment">
                <img src="./img/Buttons/achievmentBtnAndTrophie.png" alt="TROPHIE">
                <figcaption>Achievement 4</figcaption>
            </figure>
            <figure class="achievment">
                <img src="./img/Buttons/achievmentBtnAndTrophie.png" alt="TROPHIE">
                <figcaption>Achievement 5</figcaption>
            </figure>
            <figure class="achievment">
                <img src="./img/Buttons/achievmentBtnAndTrophie.png" alt="TROPHIE">
                <figcaption>Achievement 6</figcaption>
            </figure>
            <figure class="achievment">
                <img src="./img/Buttons/achievmentBtnAndTrophie.png" alt="TROPHIE">
                <figcaption>Achievement 7</figcaption>
            </figure>
            <figure class="achievment">
                <img src="./img/Buttons/achievmentBtnAndTrophie.png" alt="TROPHIE">
                <figcaption>Achievement 8</figcaption>
            </figure>
            <figure class="achievment">
                <img src="./img/Buttons/achievmentBtnAndTrophie.png" alt="TROPHIE">
                <figcaption>Achievement 9</figcaption>
            </figure>
            <figure class="achievment">
                <img src="./img/Buttons/achievmentBtnAndTrophie.png" alt="TROPHIE">
                <figcaption>Achievement 10</figcaption>
            </figure>
            <figure class="achievment">
                <img src="./img/Buttons/achievmentBtnAndTrophie.png" alt="TROPHIE">
                <figcaption>Achievement 11</figcaption>
            </figure>
            <figure class="achievment">
                <img src="./img/Buttons/achievmentBtnAndTrophie.png" alt="TROPHIE">
                <figcaption>Achievement 12</figcaption>
            </figure>
        </main>
    </div>
    <div id="levelPickContainer">
        <h1 class="levelPickTitle">Level Pick</h1>

        <div class="container">
            <a href="./unterseiten/mainGame.html">
                <div class="card">
                    <img src="./img/Backgrounds/volcano.jpg" alt="Level 1">
                    <div class="label">Level 1</div>
                </div>
            </a>

            <a href="./unterseiten/mainGame.html">
                <div class="card">
                    <img src="./img/Backgrounds/castleBg.jpg" alt="Level 2">
                    <div class="label">Level 2</div>
                </div>
            </a>

            <a href="./unterseiten/mainGame.html">
                <div class="card">
                    <img src="./img/Backgrounds/darkForestBg.jpg" alt="Level 3">
                    <div class="label">Level 3</div>
                </div>
            </a>

            <a href="./unterseiten/mainGame.html">
                <div class="card">
                    <img src="./img/Backgrounds/pixelHouseBg.jpg" alt="Level 4">
                    <div class="label">Level 4</div>
                </div>
            </a>
        </div>

        <div class="close-btn" onclick="closeLevelPick()">
            <img src="./img/Buttons/closeWoodBtn-removebg-preview.png" alt="Close">
        </div>
    </div>

    <button id="muteAudioBtn" type="button" onclick="toggleAudio()" aria-label="Mute or unmute audio">
        <img src="./img/Buttons/muteAudio.png" alt="Mute Audio">
    </button>



</body>

</html>
