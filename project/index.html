<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start</title>
    <link rel="stylesheet" href="./css/indexStyle.css">
    <script src="./js/indexScript.js" defer></script>
    <link rel="icon" href="./img/LogoImg.png" type="image/png">
    <link rel="stylesheet" href="./css/tutorialStyle.css">
    

</head>

<body>

    <div id="audioBox">
        <h1>Audio Erlebnis einschalten?</h1>
        <div id="btnDiv">
            <div onclick="startAudio()" class="audioBtn">Sicher</div>
            <div class="audioBtn">Lieber nicht</div>
        </div>
    </div>

    <div id="headlineLogo">
        <img src="./img/LogoImg.png" alt="LOGO">
    </div>
    <nav class="nav-grid">


        <a href="./unterseiten/levelPick.html">
            <img src="./img/Buttons/startGameBtn.png" alt="STARTGAME">
        </a>

        <a href="#" onclick="openTutorial(); return false;">
            <img src="./img/Buttons/questionMarkBtn.png" alt="TUTORIAL">
        </a>

        <a href="./unterseiten/achievments.html">
            <img src="./img/Buttons/achievmentBtnAndTrophie.png" alt="ACHIEVMENTS">
        </a>
    </nav>



    <div id="tutorialContainer">

        <div onclick="closeTutorial()" id="backBtn" class="backBtn">
            <img src="./img/Buttons/closeWoodBtn-removebg-preview.png" alt="GO BACK">
        </div>

        <div class="boardSection">
            <div id="bigImg">
                <img src="./img/Buttons/woodboard.png" alt="WOODBOARD">
                <p>Hier wird dir die Geschichte erklärt und auf den Btns unten kannst du dann eine Entscheidung treffen
                </p>
            </div>

            <div class="smallRow">
                <div class="smallImg">
                    <img src="./img/Buttons/woodboard.png" alt="WOODBOARD">
                    <p>Entscheidung 1:</p>
                </div>
                <div class="smallImg">
                    <img src="./img/Buttons/woodboard.png" alt="WOODBOARD">
                    <p>Entscheidung 2:</p>
                </div>
            </div>
        </div>
    </div>



</body>

</html>
